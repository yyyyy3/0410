<!DOCTYPE html>
<html lang="en">
<div id="app">
  <input v-model="name" placeholder="輸入你的名字" />
  <p>你好，{{ name }}！</p>
</div>
<!-- 引入 Vue -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
Vue.createApp({
  data() {
    return { name: "" }
  }
}).mount("#app")
</script>
</body>
</html>
